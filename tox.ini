# =============================================================================
# Stochastic Transit Router - Tox Configuration
# Testing, Linting, Type Checking, Documentation Build Orchestration
#
# This file configures the complete testing and build pipeline for the project.
# Tox creates isolated Python environments and runs tests, linting, type checking,
# and other development tasks in a repeatable and reproducible manner.
#
# Use: tox -e <environment> to run specific tasks
# Use: tox -p to run environments in parallel
# Use: tox --list to see all available environments
# =============================================================================

[tox]
# ============================================================================
# TOX GENERAL CONFIGURATION
# ============================================================================

# Minimum tox version required
minversion = 4.0

# Declare all test environments that will be executed by default
# Format: py<version>-<factor>, where factors allow selective test targeting
envlist =
    py312-unit
    py312-integration
    py312-schema
    types
    lint
    format-check
    cov
    py312-bench

# Enable parallel execution support (use -p flag to run environments in parallel)
parallel_show_output = true

# Skip missing interpreters (don't fail if Python version not available)
skip_missing_interpreters = true

# ============================================================================
# BASE TESTENV: Python Testing Foundation
# ============================================================================

[testenv]
description = Base test environment (unit tests)
basepython = python3.12

# ============================================================================
# DEPENDENCIES MANAGEMENT
# ============================================================================
deps =
    pytest>=8.4.1
    pytest-cov>=6.2.1
    pytest-asyncio>=1.0.0
    pytest-timeout>=2.1.0
    pytest-xdist>=3.7.0
    respx>=0.22.0

# Install package with test dependencies from pyproject.toml
extras = test

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
setenv =
    PYTHONPATH = {envdir}
    PYTEST_TIMEOUT = 300
    LOG_LEVEL = INFO

passenv =
    CI
    CI_*
    GITHUB_*
    HOME
    USER

# ============================================================================
# COMMANDS
# ============================================================================
commands =
    # Run unit tests with verbose output and coverage
    pytest -v \
        --timeout=300 \
        --tb=short \
        tests/unit/ \
        {posargs}

# ============================================================================
# UNIT TESTS ENVIRONMENT
# ============================================================================

[testenv:py312-unit]
description = Run unit tests for Python 3.12 with coverage tracking
basepython = python3.12
deps =
    {[testenv]deps}
extras = {[testenv]extras}
setenv = {[testenv]setenv}
passenv = {[testenv]passenv}
commands =
    pytest -v \
        --timeout=300 \
        --tb=short \
        --cov=src/stochastic_transit_router \
        --cov-report=term-missing:skip-covered \
        --cov-report=html:{envtmpdir}/coverage \
        tests/unit/ \
        {posargs}

# ============================================================================
# INTEGRATION TESTS ENVIRONMENT
# ============================================================================

[testenv:py312-integration]
description = Run integration tests for Python 3.12
basepython = python3.12
deps =
    {[testenv]deps}
extras = {[testenv]extras}
setenv = {[testenv]setenv}
passenv = {[testenv]passenv}
commands =
    pytest -v \
        --timeout=600 \
        --tb=short \
        tests/integration/ \
        {posargs}

# ============================================================================
# SCHEMA/CONTRACT TESTS ENVIRONMENT
# ============================================================================

[testenv:py312-schema]
description = Run schema validation and contract tests
basepython = python3.12
deps =
    {[testenv]deps}
extras = {[testenv]extras}
setenv = {[testenv]setenv}
passenv = {[testenv]passenv}
commands =
    pytest -v \
        --timeout=300 \
        --tb=short \
        tests/schemas/ \
        {posargs}

# ============================================================================
# COVERAGE ANALYSIS ENVIRONMENT
# ============================================================================

[testenv:cov]
description = Generate comprehensive coverage report
basepython = python3.12
deps =
    pytest>=8.4.1
    pytest-cov>=6.2.1
    pytest-asyncio>=1.0.0
    pytest-timeout>=2.1.0
    respx>=0.22.0
    coverage[toml]>=7.6.0
extras = test
setenv = {[testenv]setenv}
passenv = {[testenv]passenv}
commands =
    # Run all tests with coverage
    pytest -v \
        --timeout=300 \
        --cov=src/stochastic_transit_router \
        --cov-report=term-missing:skip-covered \
        --cov-report=html:{envtmpdir}/coverage \
        --cov-report=xml:{envtmpdir}/coverage.xml \
        --cov-report=json:{envtmpdir}/coverage.json \
        --cov-fail-under=70 \
        tests/unit/ \
        tests/integration/ \
        {posargs}

    # Generate coverage statistics
    coverage report --precision=2
    coverage html -d {envtmpdir}/coverage

# ============================================================================
# TYPE CHECKING ENVIRONMENT (MyPy)
# ============================================================================

[testenv:types]
description = Run static type checking with mypy
basepython = python3.12
deps =
    mypy>=1.16.1
    types-PyYAML>=6.0.12.20250516
    types-requests>=2.32.0
    pytest>=8.4.1
extras = dev
setenv = {[testenv]setenv}
passenv = {[testenv]passenv}
commands =
    # Type check source code
    mypy \
        --strict \
        --show-error-codes \
        --pretty \
        src/stochastic_transit_router/ \
        {posargs}

    # Type check scripts
    mypy \
        --strict \
        scripts/ \
        {posargs}

# ============================================================================
# LINTING ENVIRONMENT (Ruff)
# ============================================================================

[testenv:lint]
description = Run code linting with ruff
basepython = python3.12
deps =
    ruff>=0.12.7
extras = dev
commands =
    # Check code style and logic errors
    ruff check \
        --exit-zero \
        --statistics \
        --show-settings \
        src/stochastic_transit_router/ \
        tests/ \
        scripts/ \
        {posargs}

# ============================================================================
# CODE FORMAT CHECKING ENVIRONMENT
# ============================================================================

[testenv:format-check]
description = Check code formatting without making changes
basepython = python3.12
deps =
    ruff>=0.12.7
extras = dev
commands =
    # Check formatting without modifying files
    ruff format \
        --check \
        --diff \
        src/stochastic_transit_router/ \
        tests/ \
        scripts/ \
        {posargs}

# ============================================================================
# CODE FORMATTING ENVIRONMENT
# ============================================================================

[testenv:format]
description = Auto-format code with ruff
basepython = python3.12
deps =
    ruff>=0.12.7
extras = dev
commands =
    # Format code in-place
    ruff format \
        src/stochastic_transit_router/ \
        tests/ \
        scripts/ \
        {posargs}

    # Sort imports
    ruff check --select I --fix src/stochastic_transit_router/

# ============================================================================
# DOCUMENTATION BUILD ENVIRONMENT
# ============================================================================

[testenv:docs]
description = Build documentation (future: Sphinx integration)
basepython = python3.12
deps =
    sphinx>=7.4.7
    sphinx-rtd-theme>=2.1.2
    sphinx-autodoc-typehints>=2.0.0
extras = dev
setenv = {[testenv]setenv}
commands =
    # Note: Documentation build commands would go here
    # Currently placeholder for future Sphinx integration
    python -c "print('Documentation build framework ready')"

# ============================================================================
# BENCHMARK ENVIRONMENT
# ============================================================================

[testenv:py312-bench]
description = Run performance benchmarks
basepython = python3.12
deps =
    pytest>=8.4.1
    pytest-benchmark>=5.1.0
    psutil>=7.0.0
extras = benchmarks,test
setenv = {[testenv]setenv}
passenv = {[testenv]passenv}
commands =
    pytest -v \
        --benchmark-only \
        --benchmark-json={envtmpdir}/benchmark.json \
        --benchmark-histogram=benchmarks/results/histogram \
        --benchmark-save=baseline \
        tests/benchmarks/ \
        {posargs}

# ============================================================================
# CLEANUP ENVIRONMENT
# ============================================================================

[testenv:clean]
description = Clean all tox artifacts and caches
basepython = python3.12
skip_install = true
allowlist_externals =
    rm
    find
deps =
commands =
    python -c "import shutil; shutil.rmtree('.tox', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.pytest_cache', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.mypy_cache', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('htmlcov', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.ruff_cache', ignore_errors=True)"

# ============================================================================
# HEALTH CHECK ENVIRONMENT
# ============================================================================

[testenv:health]
description = Run all quality checks (types, lint, tests) - Quick health check
basepython = python3.12
deps =
    mypy>=1.16.1
    types-PyYAML>=6.0.12.20250516
    ruff>=0.12.7
    pytest>=8.4.1
    pytest-cov>=6.2.1
    pytest-asyncio>=1.0.0
    pytest-timeout>=2.1.0
    respx>=0.22.0
extras = test,dev
setenv = {[testenv]setenv}
passenv = {[testenv]passenv}
commands =
    # Run type checking
    mypy --no-error-summary src/stochastic_transit_router/

    # Run linting
    ruff check --exit-zero src/stochastic_transit_router/

    # Run unit tests
    pytest -q --tb=line tests/unit/

# ============================================================================
# DEVELOPMENT ENVIRONMENT
# ============================================================================

[testenv:dev]
description = Interactive development environment with all dependencies
basepython = python3.12
usedevelop = true
deps =
    {[testenv:types]deps}
    {[testenv:lint]deps}
    {[testenv]deps}
extras = dev,test,notebooks,benchmarks,deployment
setenv = {[testenv]setenv}
passenv = {[testenv]passenv}
commands =
    python -c "print('Development environment ready. Use: pytest, mypy, ruff, etc.')"
    python -c "import stochastic_transit_router; print(f'Project version: {stochastic_transit_router.__version__ if hasattr(stochastic_transit_router, \"__version__\") else \"development\"}')"

# ============================================================================
# PYTEST CONFIGURATION OVERRIDE
# ============================================================================

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
markers =
    unit: Unit level tests
    integration: Integration level tests
    benchmark: Performance benchmark tests
    schema: Data schema contract tests
    slow: Slow running tests
    asyncio: Tests requiring async support

# ============================================================================
# COVERAGE CONFIGURATION
# ============================================================================

[coverage:run]
source = src/stochastic_transit_router
branch = true
parallel = true
dynamic_context = test_function

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
    @abstractproperty
    if 0:
    if False:

precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

# ============================================================================
# FLAKE8 CONFIGURATION (Legacy, for reference)
# ============================================================================

[flake8]
max-line-length = 100
max-complexity = 10
exclude = .git, __pycache__, .venv, .eggs, *.egg-info
ignore = E203, W503

# ============================================================================
# MYPY CONFIGURATION OVERRIDE
# ============================================================================

[mypy]
python_version = 3.12
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
strict_optional = true
