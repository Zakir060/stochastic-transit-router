apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stochastic-transit-router-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stochastic-transit-router
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
