apiVersion: apps/v1
kind: Deployment
metadata:
  name: stochastic-transit-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stochastic-transit-router
  template:
    metadata:
      labels:
        app: stochastic-transit-router
    spec:
      containers:
        - name: api
          image: stochastic-transit-router:latest
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
