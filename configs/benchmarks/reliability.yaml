# =============================================================================
# Stochastic Transit Router - Reliability-Based Routing Benchmark Configuration
# Route Intelligence Platform - On-Time Arrival Probability Optimization
#
# File        : configs/benchmarks/reliability.yaml
# Description : Benchmark for reliability routing (on-time probability optimization).
#               Maximizes probability of arriving within tau seconds of deadline.
# Purpose     : Validate reliability-based routing performance
#
# Algorithm: Reliability Routing (Tau=3600s)
#   - Objective: Maximize P(arrival ≤ deadline + tau)
#   - Tau: 3600 seconds (1 hour buffer)
#   - Metrics: wall_time, reliability_probability, bootstrap_interval_width
#
# Related: robust.yaml (variance), cvar.yaml (tail risk)
# Last Updated: 2026-04-05
# Owner: Performance Team
# =============================================================================

benchmark:
  name: reliability_ranking
  algorithm: reliability_router
  query_set: nyc_stochastic_pairs
  tau_seconds: 3600
  repetitions: 10
  warmup_runs: 2
  metrics:
    - wall_time_ms
    - reliability_probability
    - bootstrap_interval_width
