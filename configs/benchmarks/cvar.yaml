# =============================================================================
# Stochastic Transit Router - CVaR Algorithm Benchmark Configuration
# Route Intelligence Platform - Stochastic Routing Performance Testing
#
# File        : configs/benchmarks/cvar.yaml
# Description : Benchmark for Conditional Value-at-Risk (CVaR) routing.
#               Optimizes for tail risk and reliability. More complex than deterministic.
# Purpose     : Validate CVaR reliability-aware routing performance
#
# Algorithm: CVaR with 95% Confidence
#   - Objective: Minimize conditional value-at-risk
#   - Alpha: 0.95 (focus on worst 5% of scenarios)
#   - Slower: More computation than Dijkstra
#   - Metrics: wall_time, cvar_seconds, var_seconds
#
# Query Set: nyc_stochastic_pairs (reliability-focused pairs)
# Related: dijkstra.yaml (fast), robust.yaml (variance-weighted)
# Last Updated: 2026-04-05
# Owner: Performance Team
# =============================================================================

benchmark:
  name: cvar_selection
  algorithm: cvar_router
  query_set: nyc_stochastic_pairs
  alpha: 0.95
  repetitions: 10
  warmup_runs: 2
  metrics:
    - wall_time_ms
    - cvar_seconds
    - var_seconds
