# =============================================================================
# Stochastic Transit Router - Robust Routing Benchmark Configuration
# Route Intelligence Platform - Mean-Variance Optimization Performance Testing
#
# File        : configs/benchmarks/robust.yaml
# Description : Benchmark for robust routing algorithm (mean-variance optimization).
#               Minimizes expected time + lambda × standard deviation.
# Purpose     : Validate robust routing performance and trade-offs
#
# Algorithm: Robust Mean-Variance Optimization (Lambda=1.0)
#   - Cost formula: E[time] + 1.0 * σ[time]
#   - Lambda: 1.0 (equal weight to mean and variance)
#   - Metrics: wall_time, score_lambda, expected_time, sigma_seconds
#
# Related: dijkstra (fast), cvar (tail risk), stochastic (general)
# Last Updated: 2026-04-05
# Owner: Performance Team
# =============================================================================

benchmark:
  name: robust_mean_variance
  algorithm: robust_router
  query_set: nyc_stochastic_pairs
  lambda: 1.0
  repetitions: 10
  warmup_runs: 2
  metrics:
    - wall_time_ms
    - score_lambda
    - expected_time_seconds
    - sigma_seconds
