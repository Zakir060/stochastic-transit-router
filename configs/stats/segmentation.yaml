# =============================================================================
# Stochastic Transit Router - Temporal Segmentation Configuration
# Route Intelligence Platform - Time-of-Day Statistical Stratification
#
# File        : configs/stats/segmentation.yaml
# Description : Configuration for dividing data by time-of-day segment.
#               Analyzes travel patterns separately for morning peak, midday, etc.
#               Enables separate distributions per time segment.
# Purpose     : Define time-of-day segments for statistical analysis
#
# Segmentation Strategy:
#   - Timezone: America/New_York (NYC)
#   - Weekday: Monday-Friday definitions
#   - Segments: 6 time periods per day
#
# Time Segments (NYC Patterns):
#   - early_morning: 5:00-6:59 (early commute)
#   - am_peak: 7:00-9:59 (morning rush)
#   - midday: 10:00-15:59 (off-peak)
#   - pm_peak: 16:00-18:59 (evening rush)
#   - evening: 19:00-22:59 (post-work)
#   - overnight: 23:00-4:59 (night service)
#
# Usage: Bootstrap statistics stratified by segment
#
# Related: bootstrap.yaml (confidence intervals)
# Last Updated: 2026-04-05
# Owner: Stats Team
# =============================================================================

segmentation:
  timezone: America/New_York
  weekday_definition:
    monday_to_friday: true
  segments:
    early_morning:
      start: "05:00:00"
      end: "06:59:59"
    am_peak:
      start: "07:00:00"
      end: "09:59:59"
    midday:
      start: "10:00:00"
      end: "15:59:59"
    pm_peak:
      start: "16:00:00"
      end: "18:59:59"
    evening:
      start: "19:00:00"
      end: "22:59:59"
    overnight:
      start: "23:00:00"
      end: "04:59:59"
