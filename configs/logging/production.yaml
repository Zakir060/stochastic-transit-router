# =============================================================================
# Stochastic Transit Router - Production Logging Configuration
# Route Intelligence Platform - Production Log Output Configuration
#
# File        : configs/logging/production.yaml
# Description : Python logging configuration for production environment.
#               Uses JSON formatting for log aggregation systems (ELK, Datadog).
#               Enforces INFO level to minimize log volume and costs.
# Purpose     : Configure structured logging for production operations
#
# Usage:
#   - Loaded by: stochastic_transit_router.telemetry.setup_logging()
#   - Applied during: Application startup
#   - Used for: Event logging, debugging, monitoring
#   - Format: JSON (parseable by log aggregation services)
#
# Configuration Sections:
#   - version: Python logging config version (always 1)
#   - disable_existing_loggers: false (preserve other handlers)
#   - formatters: Log message formatting
#   - handlers: Where logs go (stdout, files, etc)
#   - root: Root logger configuration
#   - loggers: Module-specific logger configuration
#
# Logging Levels Explained:
#   - DEBUG: Detailed information for debugging (disabled in production)
#   - INFO: General informational messages (normal production)
#   - WARNING: Warnings for potential issues
#   - ERROR: Errors that need attention
#   - CRITICAL: Critical errors that stop application
#
# JSON Log Format:
#   Fields in each log entry:
#   - asctime: ISO 8601 timestamp (e.g., 2026-04-05 14:30:45,123)
#   - levelname: Log level (INFO, WARNING, ERROR, etc)
#   - name: Logger name (module path, e.g., stochastic_transit_router.api)
#   - message: Log message text
#   - (optional) exception: Traceback if logging exception
#
# Log Entry Example:
#   {
#     "asctime": "2026-04-05 14:30:45,123",
#     "levelname": "INFO",
#     "name": "stochastic_transit_router.api",
#     "message": "Route query completed: 5 routes, latency=42ms"
#   }
#
# Usage Examples:
#   # Log messages in code
#   import logging
#   logger = logging.getLogger(__name__)
#   logger.info("Starting graph construction")
#   logger.error("Failed to load GTFS", exc_info=True)
#
#   # Load configuration
#   from stochastic_transit_router.telemetry import setup_logging
#   setup_logging('configs/logging/production.yaml')
#
# Development Configuration (different):
#   - format: Human-readable (not JSON)
#   - level: DEBUG (verbose output)
#   - handlers: Console only
#   - See: configs/logging/development.yaml
#
# Production Configuration (current):
#   - format: JSON (machine-parseable)
#   - level: INFO (balanced verbosity)
#   - handlers: Console only (container-friendly)
#   - Consumers: Log aggregation (ELK, Datadog, CloudWatch)
#
# Key Differences from Development:
#   - No DEBUG level logs (production only has INFO+)
#   - JSON format instead of human-readable text
#   - Console only (no file handlers - handled by container orchestration)
#   - All STR loggers at INFO level (no verbose logging)
#
# Handler Configuration:
#   - class: logging.StreamHandler (writes to stdout/stderr)
#   - level: INFO (minimum level for this handler)
#   - formatter: json (use JSON formatter)
#   - Why stdout? Container logs are captured from stdout
#
# Root Logger Configuration:
#   - level: INFO (minimum log level)
#   - handlers: [console] (routes to StreamHandler)
#   - Catch-all: Applies to all loggers not specifically configured
#
# Module-Specific Logger:
#   - stochastic_transit_router:
#     * level: INFO (match root)
#     * handlers: [console]
#     * propagate: false (don't bubble up to root)
#
# Why Propagate False?
#   - Problem: Without propagate: false, logs might appear twice
#   - Solution: Set propagate: false in module logger
#   - Effect: Only this handler processes these logs
#
# Environment Variables:
#   - STR_LOG_LEVEL: Override log level (e.g., 'DEBUG', 'WARNING')
#   - STR_LOG_FORMAT: Override format (e.g., 'json', 'text')
#   - Set before application startup
#
# Integration Points:
#   - Used by: stochastic_transit_router.telemetry
#   - Applied on: Application startup
#   - Outputs to: STDOUT (captured by container runtime)
#   - Consumed by: Log aggregation pipelines
#
# Log Aggregation Integration:
#   # Kubernetes: Logs from stdout → ELK/Splunk
#   # Docker: Logs from stdout → Docker logging driver
#   # Cloud: Logs from stdout → CloudWatch/Stackdriver
#
# Monitoring and Alerts:
#   - Parse JSON logs for structured search
#   - Alert on ERROR level messages
#   - Track INFO messages for audit trail
#   - Example queries (in log aggregation tool):
#     * levelname:"ERROR"
#     * name:"stochastic_transit_router.api"
#     * message:"Route query" AND levelname:"INFO"
#
# Performance Impact:
#   - JSON formatting: Minimal overhead (< 1%)
#   - INFO level: ~2-3% performance vs WARNING
#   - Console output: Depends on I/O (usually negligible)
#
# Troubleshooting:
#   - Issue: No logs appearing
#   - Cause: Level set too high (WARNING/ERROR)
#   - Fix: Set level: DEBUG or check log stream
#
#   - Issue: Logs too verbose
#   - Cause: DEBUG level enabled or too many loggers active
#   - Fix: Increase level to INFO or WARNING
#
#   - Issue: JSON parsing fails in log aggregator
#   - Cause: Format string produces invalid JSON
#   - Fix: Verify formatter matches log aggregation expectations
#
# Best Practices:
#   - Keep production at INFO level
#   - Use JSON format for log aggregation
#   - Include context: module name, operation type
#   - Log errors with stack trace (exc_info=True)
#   - Avoid logging sensitive data
#
# Related Documentation:
#   - Development logging: configs/logging/development.yaml
#   - Logging reference: docs/reference/logging.md
#   - Monitoring: docs/operations/monitoring.md
#   - Python logging: https://docs.python.org/3/library/logging.html
#
# Last Updated : 2026-04-05
# Maintained by: DevOps Team
# Owner: Olaf Laitinen (olaf.laitinen@uni.lu)
# Classification: Internal
# =============================================================================

version: 1
disable_existing_loggers: false

formatters:
  json:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: json

root:
  level: INFO
  handlers:
    - console

loggers:
  stochastic_transit_router:
    level: INFO
    handlers:
      - console
    propagate: false
