# =============================================================================
# Stochastic Transit Router - Production Docker Compose
# Single-Container API Service Orchestration
#
# This Docker Compose file defines the production API service stack.
# It includes health checks, resource limits, logging configuration, and
# environment variable management for deployment scenarios.
#
# Usage:
# - Build: docker-compose build
# - Start: docker-compose up -d
# - Stop: docker-compose down
# - Logs: docker-compose logs -f api
# - Shell: docker-compose exec api bash
#
# Documentation: https://docs.docker.com/compose/
# Compose file specification: https://docs.docker.com/compose/compose-file/
# Service configuration: https://docs.docker.com/compose/compose-file/05-services/
# =============================================================================

version: '3.9'

# ============================================================================
# SERVICES - Container definitions
# ============================================================================

services:

  # ========================================================================
  # API SERVICE - Main application server
  # ========================================================================
  api:
    # Build the container image from Dockerfile
    build:
      context: ..                       # Build context is parent directory
      dockerfile: docker/Dockerfile     # Use production Dockerfile
      # Advanced build options
      args:
        - BUILDKIT_INLINE_CACHE=1       # Enable inline cache for faster rebuilds
      # Cache policy for better performance
      cache_from:
        - type=local,src=/tmp/.buildx-cache

    # Container name for easy reference
    container_name: stochastic-router-api

    # Image naming: organization/project:version
    image: stochastic-transit-router:latest

    # Resource limits and reservations
    deploy:
      # Limit resource usage to prevent resource exhaustion
      resources:
        limits:
          cpus: '2.0'                  # Maximum CPU (2 cores)
          memory: 2G                   # Maximum memory
        reservations:
          cpus: '1.0'                  # Guaranteed CPU allocation
          memory: 1G                   # Guaranteed memory allocation

    # Port mapping: host:container
    ports:
      - "8000:8000"                    # API port: localhost:8000 -> container:8000

    # Environment variables for application configuration
    environment:
      # Python runtime behavior
      - PYTHONUNBUFFERED=1             # Real-time output to logs
      - PYTHONDONTWRITEBYTECODE=1      # Skip .pyc generation
      # Application configuration
      - APP_ENV=production             # Deployment environment
      - LOG_LEVEL=INFO                 # Production logging level
      # API worker configuration
      - WORKERS=4                      # Number of Uvicorn worker processes
      - WORKER_CLASS=uvicorn.workers.UvicornWorker  # Worker implementation
      # Network configuration
      - HOST=0.0.0.0                   # Bind to all interfaces
      - PORT=8000                      # API port
      # Performance tuning
      - KEEPALIVE_TIMEOUT=65           # Connection keepalive timeout
      - PROXY_HEADERS=true             # Trust X-Forwarded-* headers

    # Volume mounts: host_path:container_path:mode
    volumes:
      # Read-only configs: application configuration mounted as read-only
      - ../configs:/app/configs:ro     # Configs: read-only

      # Data directory: persistent data storage
      - ../data:/app/data              # Data: read-write for persistence

      # Logs directory: application output logging
      - ./logs:/app/logs               # Logs: persistent application logs

    # Restart policy for high availability
    restart: unless-stopped            # Restart unless explicitly stopped
    # Policy options: no, always, unless-stopped, on-failure[:max-retries]

    # Health check configuration (for Kubernetes and orchestration)
    healthcheck:
      # HTTP GET request to health endpoint
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s                    # Check every 30 seconds
      timeout: 10s                     # Wait 10 seconds for response
      retries: 3                       # Fail after 3 consecutive failures
      start_period: 60s                # Grace period before first check

    # Logging configuration for centralized log collection
    logging:
      driver: "json-file"              # JSON log driver for compatibility
      options:
        max-size: "10m"                # Max log file size (10 MB)
        max-file: "3"                  # Keep 3 log files
        labels: "service=api,version=0.1.0"  # Metadata labels

    # Network mode and hostname
    hostname: api                      # Container hostname
    networks:
      - default                        # Connect to default network

    # Depends on other services (useful for multi-service compose)
    # depends_on:
    #   - database
    #   - cache

    # Security options
    security_opt:
      - no-new-privileges              # Prevent privilege escalation
    cap_drop:
      - ALL                            # Drop all Linux capabilities
    cap_add:
      - NET_BIND_SERVICE               # Only add back what's needed

    # User to run container as
    # user: "1000:1000"                 # Run as non-root user (if enabled in Dockerfile)

# ============================================================================
# NETWORKS - Container networking
# ============================================================================

networks:
  default:
    name: stochastic-router-network
    driver: bridge
    driver_opts:
      # Enable IPv6 support
      com.docker.network.driver.mtu: 1500
    ipam:
      config:
        # Specify IP range for network
        - subnet: 172.20.0.0/16

# ============================================================================
# VOLUMES - Persistent storage definitions
# ============================================================================

volumes:
  # Named volumes can be shared across services
  # Uncomment to create persistent volumes managed by Docker
  # api_data:
  #   driver: local

# ============================================================================
# EXTENSION AND OVERRIDES
# ============================================================================
#
# Override in production with:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Override specific sections in docker-compose.override.yml (Git-ignored):
# Example volume paths, different resource limits, additional services
#
# =============================================================================
#
# COMMON OPERATIONS
# =============================================================================
#
# Build and start service:
# docker-compose up -d --build
#
# View logs in real-time:
# docker-compose logs -f api
#
# View specific log lines:
# docker-compose logs --tail=100 api
#
# Execute command in running container:
# docker-compose exec api bash
# docker-compose exec api python -c "import stochastic_transit_router; print(stochastic_transit_router.__version__)"
#
# Scale service (if supported):
# docker-compose up -d --scale api=3
#
# Health status check:
# docker-compose ps             # Check container status
# curl http://localhost:8000/health  # Direct health check
#
# Performance monitoring:
# docker stats stochastic-router-api  # CPU, memory, network, block I/O
#
# Stop and remove containers:
# docker-compose down            # Stop containers, keep volumes
# docker-compose down -v         # Stop containers, remove volumes
#
# Rebuild without cache:
# docker-compose build --no-cache api
#
# Push to registry:
# docker tag stochastic-transit-router:latest myregistry/stochastic-router:latest
# docker push myregistry/stochastic-router:latest
#
# =============================================================================
