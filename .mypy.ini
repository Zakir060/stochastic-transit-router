# =============================================================================
# Stochastic Transit Router - MyPy Static Type Checking Configuration
# Comprehensive Type Safety Enforcement for Python Source Code
#
# This file configures MyPy (Python static type checker) to enforce strict
# type safety throughout the project. MyPy catches type errors before runtime,
# improves code documentation through type hints, and enables better IDE support
# with autocompletion and inline error detection.
#
# MyPy enforces:
# - All function parameters and return types must be annotated
# - All class attributes must have types
# - Type-incompatible operations are detected
# - Unused variables and imports are flagged
# - Type narrowing is enforced
#
# Documentation: https://mypy.readthedocs.io/
# Configuration: https://mypy.readthedocs.io/en/stable/config_file.html
# =============================================================================

# ============================================================================
# GLOBAL MYPY CONFIGURATION (applies to all files unless overridden)
# ============================================================================

[mypy]

# ============================================================================
# PYTHON VERSION SPECIFICATION
# ============================================================================

# Python version to target (3.12 - enables latest Python features)
# MyPy uses this to understand language features and standard library types
# Must match project's minimum supported Python version in pyproject.toml
python_version = 3.12

# ============================================================================
# STRICT MODE - COMPREHENSIVE TYPE CHECKING
# ============================================================================

# Enable strict mode: enforces maximum type safety
# Equivalent to enabling all individual strict-like options
# Strict mode includes:
#   - disallow_untyped_defs: All function signatures must have types
#   - disallow_any_generics: Generics (List, Dict) must specify element types
#   - check_untyped_defs: Check bodies of functions without type hints
#   - no_implicit_optional: Optional[X] must be explicit
#   - warn_redundant_casts: Warn about unnecessary type casts
#   - warn_unused_ignores: Warn about unused # type: ignore comments
#   - warn_return_any: Warn when returning Any type
#   - warn_unreachable: Warn about unreachable code paths
strict = True

# ============================================================================
# ERROR REPORTING AND DIAGNOSTICS
# ============================================================================

# Show error message codes for filtering
# Enables: mypy --disable-error-code=attr-defined
show_error_codes = True

# Show error messages in color and with code context
# Format errors as: filename.py:123: error: message [error-code]
pretty = True

# Show detailed error context (code snippets with markers)
# Helps understand what MyPy is checking
show_error_context = True

# Show column numbers in error messages
show_column_numbers = True

# Report the number of errors at the end
# Useful for tracking improvement over time
stats = False

# ============================================================================
# IMPORT PATH AND PACKAGE CONFIGURATION
# ============================================================================

# Set module search path for imports
# MyPy looks in these directories to find modules
mypy_path = src

# Treat all packages as namespace packages (PEP 420)
# Allows implicit namespace packages without __init__.py
namespace_packages = True

# Treat the current module as having an explicit package root
# Enables proper relative imports within packages
explicit_package_bases = True

# Ignore missing imports (packages not installed or type stubs unavailable)
# Note: When False, MyPy warns about unable-to-import missed modules
# Keep as False to catch real import errors
ignore_missing_imports = False

# ============================================================================
# FUNCTION AND VARIABLE TYPE ENFORCEMENT
# ============================================================================

# Disallow function definition without type annotations
# Every function parameter and return type must be specified
# Exceptions: __init__, __repr__, __str__ can infer from usage
disallow_untyped_defs = True

# Disallow incomplete function type definitions
# If any parameter or return type is untyped, error
# Prevents mixing typed and untyped signatures
disallow_incomplete_defs = True

# Check function bodies even if function signature lacks type hints
# Helps catch type errors in untyped code
check_untyped_defs = True

# Disallow untyped function calls
# Calling functions without type stubs is flagged
disallow_untyped_calls = True

# Disallow functions without signatures decorated with @overload
# Ensures overloaded functions are properly typed
disallow_untyped_decorators = True

# ============================================================================
# OPTIONAL AND UNION TYPE ENFORCEMENT
# ============================================================================

# Disallow implicit Optional types
# Requires explicit Optional[X] instead of assuming None is possible
# Example: `x: int = None` → error; must be `x: Optional[int] = None`
no_implicit_optional = True

# Strictly follow Optional type semantics
# Optional[X] can be None; X cannot
strict_optional = True

# ============================================================================
# GENERIC TYPE ENFORCEMENT
# ============================================================================

# Disallow unspecified generics
# List, Dict, Set must specify element types
# Example: `List` → error; must be `List[str]`
disallow_any_generics = True

# Disallow Any type (most permissive type, defeats type safety)
# Requires explicit types instead of falling back to Any
# Use # type: ignore if truly necessary
disallow_any_unimported = True

# Flag Any type from library imports
disallow_any_expr = False  # Less strict (some libraries use Any)

# ============================================================================
# CAST AND ASSERTION HANDLING
# ============================================================================

# Warn about redundant type casts
# Flags unnecessary: cast(int, x) when x is already int
warn_redundant_casts = True

# Warn about redundant # type: ignore comments
# Flags # type: ignore on lines that don't have type errors
warn_unused_ignores = True

# ============================================================================
# RETURN TYPE VALIDATION
# ============================================================================

# Warn when returning Any type
# Flag functions that don't explicitly type their returns
# Helps prevent accidental Any propagation
warn_return_any = True

# Require explicit return type for functions
# Already covered by disallow_untyped_defs
# This reinforces that all returns must be typed

# ============================================================================
# CODE PATH AND COVERAGE ANALYSIS
# ============================================================================

# Warn about unreachable code
# Detects dead code after returns, raises, etc.
warn_unreachable = True

# Report unused type: ignore comments
# Helps clean up unnecessary type ignores
warn_unused_ignores = True

# ============================================================================
# CONFIGURATION VALIDATION
# ============================================================================

# Warn about unused configuration options
# Catches typos in config file (e.g., "disalow_untyped_defs")
warn_unused_configs = True

# ============================================================================
# ERROR SILENCE AND EXCEPTIONS
# ============================================================================

# Error codes to disable globally (use sparingly)
# Individual lines can use # type: ignore[error-code]
# Keep commented to enforce all checks
# disabled_error_codes =
#     type-arg,  # Allow unspecified generics
#     assignment,  # Allow type mismatches

# ============================================================================
# PER-MODULE CONFIGURATION - TEST SUITE
# ============================================================================

# Tests have relaxed type checking (testing is dynamic)
# Type hints for tests are nice but not critical
# Allows faster iteration during test development

[mypy-tests.*]
description = Tests: Relaxed type checking configuration

# Disallow untyped function defs in tests: False (optional in tests)
disallow_untyped_defs = False

# Disallow incomplete defs in tests: False
disallow_incomplete_defs = False

# Disallow untyped calls in tests: False (fixtures may not be typed)
disallow_untyped_calls = False

# Still check function bodies for obvious errors
check_untyped_defs = True

# ============================================================================
# PER-MODULE CONFIGURATION - SCRIPTS
# ============================================================================

# Scripts: Slightly relaxed, but still require some type safety
# Scripts are used for data processing and utilities
# Balance between type safety and development speed

[mypy-scripts.*]
description = Scripts: Moderate type checking configuration

# Scripts can have untyped definitions (less critical)
disallow_untyped_defs = False

# But still check definitions present
check_untyped_defs = True

# ============================================================================
# PER-MODULE CONFIGURATION - THIRD-PARTY LIBRARIES
# ============================================================================

# External libraries may not have type stubs
# Configure specific libraries that lack proper typing

[mypy-numpy.*]
description = NumPy: Library without complete type stubs (as of 2026)
ignore_missing_imports = True
ignore_errors = True

[mypy-scipy.*]
description = SciPy: Library without complete type stubs
ignore_missing_imports = True
ignore_errors = True

[mypy-pandas.*]
description = Pandas: Library with partial type stubs
ignore_missing_imports = False
ignore_errors = False

[mypy-networkx.*]
description = NetworkX: Graph library with type stubs
ignore_missing_imports = False

[mypy-pytest.*]
description = Pytest: Testing framework with type stubs
ignore_missing_imports = False

[mypy-yaml.*]
description = PyYAML: YAML parsing with type stubs
ignore_missing_imports = False

[mypy-polars.*]
description = Polars: DataFrames with type stubs
ignore_missing_imports = False

[mypy-pyarrow.*]
description = PyArrow: Apache Arrow with type stubs
ignore_missing_imports = False

[mypy-duckdb.*]
description = DuckDB: SQL database with type stubs
ignore_missing_imports = False

[mypy-shapely.*]
description = Shapely: Geometric operations with type stubs
ignore_missing_imports = False

[mypy-msgpack.*]
description = MessagePack: Serialization with type stubs
ignore_missing_imports = False

# ============================================================================
# PER-MODULE CONFIGURATION - FASTAPI & PYDANTIC
# ============================================================================

[mypy-fastapi.*]
description = FastAPI: Web framework with type stubs
ignore_missing_imports = False
ignore_errors = False

[mypy-pydantic.*]
description = Pydantic: Data validation with type stubs
ignore_missing_imports = False
ignore_errors = False

# Pydantic v2 has excellent type support
# Keep strict checking enabled for Pydantic code

[mypy-starlette.*]
description = Starlette: ASGI framework (FastAPI dependency) with type stubs
ignore_missing_imports = False

# ============================================================================
# PER-MODULE CONFIGURATION - HTTPX
# ============================================================================

[mypy-httpx.*]
description = HTTPX: Async HTTP client with type stubs
ignore_missing_imports = False

# ============================================================================
# PER-MODULE CONFIGURATION - TYPER (CLI FRAMEWORK)
# ============================================================================

[mypy-typer.*]
description = Typer: CLI framework with type stubs
ignore_missing_imports = False

# ============================================================================
# REGULAR EXPRESSION FOR UNTYPED MODULES
# ============================================================================

# Catch-all for any remaining untyped third-party libraries
# Use only after checking that specific module doesn't have stubs

# [mypy-mylib.*]
# ignore_missing_imports = True

# ============================================================================
# TYPE CHECK PLUGINS (if needed)
# ============================================================================

# plugins =
#     pydantic.mypy  # Pydantic plugin for better type checking
#     sqlalchemy.ext.mypy.plugin  # SQLAlchemy plugin (if used)

# ============================================================================
# INCREMENTAL MODE CONFIGURATION
# ============================================================================

# Use incremental type checking (caches results between runs)
incremental = True

# Cache directory for incremental type checking
cache_dir = .mypy_cache

# ============================================================================
# FOLLOW IMPORTS CONFIGURATION
# ============================================================================

# How to follow imports for type checking
# follow_imports = normal  # Follow all imports (default)
# follow_imports = silent  # Follow but don't report errors
# follow_imports = skip    # Don't follow imports
# follow_imports = error   # Report import as error

# Use normal (follow imports and check them)
follow_imports = normal

# Follow imports that are imported via __init__.py
follow_imports_for_stubs = True

# ============================================================================
# SPECIAL TYPE HANDLING
# ============================================================================

# Allow conditional type checking based on platform/version
# Example: if sys.platform == 'win32': ...
# Enables platform-specific type narrowing
always_true = []
always_false = []

# ============================================================================
# PERFORMANCE OPTIMIZATION
# ============================================================================

# Number of parallel type checking processes
# 0 = auto-detect (CPU count)
# Higher values: faster checking but more memory
# Typically: CPU count - 1
# mypy_daemon_client processes = auto

# Use daemon mode for faster repeated checking
# Requires: dmypy (separate tool)
# Enable with: dmypy run

# ============================================================================
# OUTPUT FORMATTING OPTIONS
# ============================================================================

# Output format for error messages
out_dir = null
junit_xml = null
html_report = htmlcov/mypy

# Number of most recent errors to show
num_incremental_args = 10

# ============================================================================
# VERBOSITY AND DEBUGGING
# ============================================================================

# Show verbose output (useful for debugging)
# verbose = False

# Show which files are being checked
# show_traceback = False

# ============================================================================
# CONFIGURATION NOTES AND BEST PRACTICES
# ============================================================================

# STRICT MODE PHILOSOPHY:
# =====================
#
# This configuration enforces strict typing because:
#
# 1. TYPE SAFETY: Catches bugs before runtime
#    - Missing type hints → compile error, not runtime exception
#    - Type mismatches → caught before deployment
#
# 2. CODE DOCUMENTATION: Types serve as inline documentation
#    - Function signature clearly shows what it accepts/returns
#    - IDE autocompletion becomes very accurate
#
# 3. MAINTAINABILITY: Easier to refactor with confidence
#    - Type checker ensures all callers handle type changes
#    - Missing migrations are caught immediately
#
# 4. IDE SUPPORT: Full IDE integration
#    - PyCharm, VS Code understand all types
#    - Inline error squiggles guide development
#

# WHEN TO USE # type: ignore
# ===========================
#
# Disable type checking on a line only when:
# 1. Third-party library lacks type stubs
# 2. Complex type logic that confuses MyPy
# 3. Intentional type unions that don't satisfy type checker
#
# Always document WHY you're ignoring:
#   x = some_untyped_function()  # type: ignore[assignment]  # Library lacks stubs
#

# COMMON ERRORS AND SOLUTIONS
# ============================
#
# Error: Argument 1 has incompatible type "X" (expected "Y")
#   → Check function signature, ensure types match
#   → Use cast() if intentional type conversion
#
# Error: Need type annotation for variable "x"
#   → Add explicit type: x: int = 10
#   → Or let type inference: x = 10  # inferred as int
#
# Error: Incompatible types in assignment (expression has type "Y", variable has type "X")
#   → Variable is declared as X but you're assigning Y
#   → Either change variable type or assignment value
#
# Error: Item "Y" of "X" only partially defined (missing attributes)
#   → Only some attributes of object are available in this code path
#   → Use type guards or assert to narrow type: assert x is not None
#
# Error: "Optional" cannot have no arguments in type
#   → Use Optional[int], not Optional
#   → Shorthand: int | None (Python 3.10+)
#

# RUNNING MYPY
# ============
#
# Check all source code:
#   mypy src/
#
# Check with configuration:
#   mypy --config-file .mypy.ini src/
#
# Check specific file:
#   mypy src/module.py
#
# Check and report all codes:
#   mypy --show-error-codes src/
#
# Check with error statistics:
#   mypy --stats src/
#
# Check in daemon mode (slower first run, fast after):
#   dmypy run -- src/
#

# TYPE ANNOTATION EXAMPLES
# ========================
#
# Basic types:
#   x: int = 10
#   name: str = "Alice"
#   values: list[int] = [1, 2, 3]
#   mapping: dict[str, int] = {"a": 1}
#
# Optional types (can be None):
#   maybe_int: int | None = None
#   Optional[str]  # Equivalent (older style)
#
# Union types (multiple possible types):
#   value: int | str = 10  # Can be int or str
#   Union[int, str]  # Equivalent (older style)
#
# Function types:
#   def greet(name: str) -> str:
#       return f"Hello, {name}"
#
# Generic types:
#   from typing import TypeVar, Generic
#   T = TypeVar('T')
#   class Container(Generic[T]):
#       def add(self, item: T) -> None: ...
#
# Callable types:
#   def apply(f: Callable[[int], str], x: int) -> str:
#       return f(x)
#

# MYPY PLUGINS AND EXTENSIONS
# ============================
#
# Pydantic plugin (better dataclass validation):
#   pip install pydantic
#   plugins = pydantic.mypy
#
# SQLAlchemy plugin (if using SQLAlchemy):
#   plugins = sqlalchemy.ext.mypy.plugin
#

