# =============================================================================
# Stochastic Transit Router - Python Project Configuration (PEP 621)
# Project Metadata, Dependencies, and Tool Configuration
#
# This file defines the complete project configuration using the modern
# Python packaging standard (PEP 621). It includes:
# - Project metadata (name, version, authors, description)
# - Package dependencies and optional extras
# - Build system configuration
# - Development tool configuration (pytest, coverage, etc.)
#
# Official Documentation: https://packaging.python.org/en/latest/
# PEP 621: https://www.python.org/dev/peps/pep-0621/
# PEP 518: https://www.python.org/dev/peps/pep-0518/
# =============================================================================

# ============================================================================
# BUILD SYSTEM SPECIFICATION (PEP 518)
# ============================================================================
# Specifies how to build and install the project
# Modern standard uses setuptools with build isolation

[build-system]

# Build backend module and hook function
# Uses setuptools as the build backend (standard for Python packaging)
build-backend = "setuptools.build_meta"

# Dependencies required by the build system itself
# Not installed as runtime dependencies, only needed during build
requires = [
  "setuptools>=77.0.0",              # Modern setuptools for PEP 621 support
  "wheel>=0.43.0",                   # Binary package format
  "setuptools-scm>=7.1.0"            # Version management from git tags (optional)
]


# ============================================================================
# PROJECT METADATA (PEP 621 - Required)
# ============================================================================

[project]

# Project name (what pip installs as)
# Naming: lowercase, hyphens allowed, must be unique on PyPI
name = "stochastic-transit-router"

# Project version (semantic versioning: MAJOR.MINOR.PATCH[-PRERELEASE])
# 0.1.0 = alpha/foundational release, not production-ready
# Keep synchronized with __version__ in src/__init__.py
version = "0.1.0"

# One-line project description (shown on PyPI)
# Keep under 100 characters for readability
description = "Research-grade stochastic dynamic transit router built from official public data sources."

# Longer description (shown on PyPI project page)
# Usually points to README.md for full documentation
readme = "README.md"

# Python version requirement (PEP 440 version specifiers)
# Requires Python 3.12 or newer
# 3.12+ features: better error messages, faster performance, typing improvements
requires-python = ">=3.12"

# Project license (SPDX identifier)
# EUPL-1.2 = European Union Public Licence v1.2
# Compatible with AGPL, GPL, LGPL (copyleft compatible)
license = { text = "EUPL-1.2" }

# Project authors (name and optional email)
# Primary contact: Zakir Bayramov (Lead Developer)
# Secondary contact: Gustav Olaf Yunus Laitinen-Lundström Fredriksson-Imanov (Research Lead)
authors = [
  { name = "Zakir Bayramov", email = "zakirbayramov942@gmail.com" },
  { name = "Gustav Olaf Yunus Laitinen-Lundström Fredriksson-Imanov", email = "olaf.laitinen@uni.lu" }
]

# Project maintainers (people responsible for maintenance)
# Usually same as authors, but can differ for community projects
maintainers = [
  { name = "Zakir Bayramov", email = "zakirbayramov942@gmail.com" },
  { name = "Gustav Olaf Yunus Laitinen-Lundström Fredriksson-Imanov", email = "olaf.laitinen@uni.lu" }
]

# Project keywords (for searching on PyPI)
# Helps users discover project through search
keywords = [
  "public-transit",                   # Domain: public transportation
  "stochastic-routing",               # Algorithm type
  "dynamic-routing",                  # Features: real-time, dynamic
  "operations-research",              # Field: OR/optimization
  "graph-algorithms",                 # Underlying algorithms
  "gtfs",                             # Data format: General Transit Feed Spec
  "gtfs-realtime",                    # Real-time data format
  "time-dependent",                   # Algorithm classification
  "shortest-path",                    # Core algorithm
  "uncertainty-quantification",       # Capability
  "reproducibility",                  # Quality attribute
  "research-software",                # Classification
  "nyc"                               # Geographic focus
]

# PyPI classifiers (project categorization)
# Helps categorize project on PyPI for discovery
classifiers = [
  # Development status
  "Development Status :: 3 - Alpha",  # 0.1.0 = alpha, not production-ready

  # Intended audience
  "Intended Audience :: Science/Research",  # Academic researchers
  "Intended Audience :: Developers",        # Software engineers
  "Intended Audience :: System Administrators", # Ops/DevOps

  # License
  "License :: OSI Approved :: European Union Public Licence 1.2 (EUPL 1.2)",

  # Programming language
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",      # Future support

  # Natural Language
  "Natural Language :: English",

  # Topics
  "Topic :: Scientific/Engineering",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Topic :: Scientific/Engineering :: Bio-Informatics",
  "Topic :: Scientific/Engineering :: GIS",      # Geographic Info Systems
  "Topic :: Software Development :: Libraries :: Python Modules",

  # Environment
  "Environment :: Console",
  "Environment :: Web Environment",

  # Operating systems
  "Operating System :: OS Independent",
  "Operating System :: POSIX",
  "Operating System :: POSIX :: Linux",
  "Operating System :: MacOS",
  "Operating System :: Microsoft :: Windows",

  # Typing
  "Typing :: Typed"                   # Project uses type hints
]

# ============================================================================
# CORE DEPENDENCIES (Required at runtime)
# ============================================================================
# These are installed with every `pip install stochastic-transit-router`
# Keep versions flexible to avoid conflicts, but constrain to known-good ranges

dependencies = [
  # WEB FRAMEWORK & ASYNC
  # ====================
  "fastapi>=0.116.0",                 # Modern async web framework
  "uvicorn[standard]>=0.35.0",       # ASGI server (includes uvloop on Unix)
  "pydantic>=2.11.0",                 # Data validation and serialization

  # CLI FRAMEWORK
  # =============
  "typer>=0.16.0",                    # Type-rich CLI framework (fastapi for CLIs)

  # HTTP CLIENT (Async)
  # ==================
  "httpx>=0.28.0",                    # Async HTTP client (for feed updates)

  # CONFIGURATION
  # =============
  "pyyaml>=6.0.2",                    # YAML parsing (config files)

  # DATA PROCESSING
  # ===============
  "polars>=1.30.0",                   # Fast DataFrames (pandas alternative)
  "pyarrow>=20.0.0",                  # Apache Arrow columnar format
  "duckdb>=1.2.2",                    # Embedded SQL engine (for queries)

  # SCIENTIFIC COMPUTING
  # ====================
  "numpy>=2.2.0",                     # Numerical computing
  "scipy>=1.15.0",                    # Scientific algorithms

  # GRAPH ALGORITHMS
  # ================
  "networkx>=3.4.2",                  # Graph algorithms and data structures

  # SERIALIZATION
  # =============
  "msgpack>=1.1.0",                   # Efficient binary serialization

  # GEOSPATIAL
  # ==========
  "shapely>=2.1.1"                    # Geometric operations (walking paths)
]

# ============================================================================
