  "types-requests>=2.32.0",           # Type stubs for requests
  "mdformat>=0.7.22",                 # Markdown formatter
  "pylint>=3.0.0"                     # Additional linting checks
]

# Testing and coverage
test = [
  "pytest>=8.4.1",                    # Test framework
  "pytest-cov>=6.2.1",                # Coverage measurement
  "pytest-asyncio>=1.0.0",            # Async test support
  "pytest-timeout>=2.1.0",            # Test timeout enforcement
  "pytest-xdist>=3.7.0",              # Parallel test execution
  "respx>=0.22.0",                    # Mock HTTP requests (httpx)
  "pytest-benchmark>=5.1.0",          # Performance benchmarking
]

# Jupyter notebooks and visualization
notebooks = [
  "jupyterlab>=4.4.5",                # Interactive notebook environment
  "matplotlib>=3.10.0",               # Plotting library
  "seaborn>=0.13.2",                  # Statistical visualization
  "plotly>=6.2.0"                     # Interactive plots
]

# Performance benchmarking
