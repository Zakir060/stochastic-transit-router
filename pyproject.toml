  "stochastic-transit-router[dev,test,notebooks,benchmarks,deployment]"
]

# ============================================================================
# PROJECT URLS
# ============================================================================
# Links to related resources shown on PyPI

[project.urls]

# Project homepage
Homepage = "https://github.com/Zakir060/stochastic-transit-router"

# Source code repository
Repository = "https://github.com/Zakir060/stochastic-transit-router"

# Full documentation
Documentation = "https://github.com/Zakir060/stochastic-transit-router/tree/main/docs"

# Bug/issue tracking
Issues = "https://github.com/Zakir060/stochastic-transit-router/issues"

# Changelog location
Changelog = "https://github.com/Zakir060/stochastic-transit-router/blob/main/CHANGELOG.md"

# How to contribute
Contributing = "https://github.com/Zakir060/stochastic-transit-router/blob/main/CONTRIBUTING.md"

# Security policy
Security = "https://github.com/Zakir060/stochastic-transit-router/blob/main/SECURITY.md"

# Citation information
Citation = "https://github.com/Zakir060/stochastic-transit-router/blob/main/CITATION.cff"

# ============================================================================
# SETUPTOOLS CONFIGURATION
# ============================================================================
# Configures how setuptools builds and packages the project

[tool.setuptools]

# Package discovery: map package directories
# "" = src directory (where packages live)
# Maps Python packages from src/ to installation root
package-dir = { "" = "." }

# Include non-Python files (data files, manifests, etc.)
# Uses patterns from MANIFEST.in
include-package-data = true

# ============================================================================
# SETUPTOOLS PACKAGE DISCOVERY
# ============================================================================
# How to automatically find Python packages to include

[tool.setuptools.packages.find]

# Directory where to search for packages
# searchs recursively for directories with __init__.py
where = ["."]

# Patterns to include (namespace packages)
include = ["src*", "stochastic_transit_router*"]

# Patterns to exclude
exclude = ["tests*", "docs*", "scripts*"]

# ============================================================================
# PYTEST CONFIGURATION (Testing Framework)
# ============================================================================
# Configures test discovery, execution, and reporting

[tool.pytest.ini_options]

# Minimum pytest version required
minversion = "8.0"

# Directories where pytest searches for tests
testpaths = ["tests"]

# Current working directory for test execution
# "src_first" = test from src directory (for import testing)
pythonpath = ["src"]

# Default command-line options applied to every pytest run
addopts = [
  "-ra",
  "--strict-markers",
  "--strict-config",
  "--tb=short"
]

# Test discovery patterns
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"

# Markers for categorizing tests (prevent unknown marker warnings)
markers = [
  "unit: marks unit tests (no I/O)",
  "integration: marks integration tests (with I/O, databases, etc.)",
  "e2e: marks end-to-end tests (full system workflow)",
  "benchmark: marks benchmark/performance tests",
  "schema: marks schema/contract validation tests",
  "slow: marks tests that take significant time to run",
  "asyncio: marks async tests requiring event loop",
  "regression: marks regression tests for known bugs",
  "skip_ci: skip this test in CI (local-only tests)"
]

# Asyncio mode (for pytest-asyncio plugin)
asyncio_mode = "auto"

# Test collection ignore patterns
norecursedirs = [
  ".git", ".tox", ".venv", "venv", "dist", "build", "*.egg-info",
  ".pytest_cache", ".mypy_cache", ".ruff_cache", "__pycache__",
  "htmlcov", ".idea", ".vscode"
]

# Console output configuration
console_output_style = "progress"

# Logging configuration
log_cli = true
log_cli_level = "INFO"
log_file = ".pytest.log"
log_file_level = "DEBUG"

# ============================================================================
# COVERAGE.PY CONFIGURATION (Code Coverage Measurement)
# ============================================================================
# Configures how coverage is measured and reported

[tool.coverage.run]

# Both line and branch coverage
branch = true

# Source directories to measure coverage for
source = ["src"]

# Omit files from coverage measurement (test fixtures, etc.)
omit = [
  "*/tests/*",
  "*/test_*.py",
  "*/__init__.py",
  "*/site-packages/*"
]

# Set a random seed for reproducible test execution
# Ensures consistent test ordering across runs
parallel = true
dynamic_context = "test_function"

# ============================================================================
# COVERAGE REPORTING CONFIGURATION
# ============================================================================

[tool.coverage.report]

# Show lines that weren't covered
show_missing = true

# Skip source files with 100% coverage (reduces noise)
skip_covered = false

# Precision for coverage percentages (2 decimal places)
precision = 2

# Exclude lines from coverage measurement
exclude_lines = [
  # Standard pragma
  "pragma: no cover",

  # Don't complain about debug code
  "def __repr__",
  "def __str__",
  "raise AssertionError",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",

  # Abstract methods
  "@abstractmethod",
  "@abstractproperty",

  # Dead code
  "if 0:",
  "if False:",
]

# ============================================================================
# COVERAGE HTML REPORT CONFIGURATION
# ============================================================================

[tool.coverage.html]

# Directory for HTML coverage report
directory = "htmlcov"

# ============================================================================
# COVERAGE XML REPORT (For CI/CD)
# ============================================================================

[tool.coverage.xml]

# Output file for CI/CD coverage reporting
output = "coverage.xml"

# ============================================================================
# COVERAGE JSON REPORT
# ============================================================================

[tool.coverage.json]

# Output file for JSON coverage data
output = "coverage.json"

# Pretty-print JSON
pretty_print = true

# Show contexts (which test covered which code)
show_contexts = true

# ============================================================================
# PROJECT ENTRY POINTS
# ============================================================================
# Create executable commands when package is installed

[project.scripts]

# CLI command entry point
# Creates `transit-router` command when package installed
# Points to main function in src/cli/main.py
stochastic-transit-router = "stochastic_transit_router.cli.main:app"

# Shorter alias
str = "stochastic_transit_router.cli.main:app"

# ============================================================================
# TOOL CONFIGURATION - GENERAL NOTES
# ============================================================================

# Other tools (mypy, ruff, etc.) have their own config files:
# - .mypy.ini: Type checking configuration
# - .ruff.toml: Linting and formatting
# - .pre-commit-config.yaml: Pre-commit hooks
# - tox.ini: Testing orchestration
# - pyproject.toml (this file): Core project config + pytest, coverage

# Keeping tool configs in separate files allows:
# - Tool-specific documentation and comments
# - Easier tool configuration without bloating pyproject.toml
# - Standard locations where tools expect configuration

# ============================================================================
# CONFIGURATION NOTES AND BEST PRACTICES
# ============================================================================

# VERSION MANAGEMENT:
# ===================
#
# Three places to keep version in sync:
# 1. pyproject.toml [project] version = "0.1.0"
# 2. src/stochastic_transit_router/__init__.py __version__ = "0.1.0"
# 3. CHANGELOG.md [0.1.0] - Release notes
#
# On release:
#   1. Update version in pyproject.toml
#   2. Update src/__init__.py
#   3. Add release notes to CHANGELOG.md
#   4. Commit with tag: git tag v0.1.0
#   5. Build: python -m build
#   6. Upload: twine upload dist/*
#

# DEPENDENCY MANAGEMENT:
# ======================
#
# Core dependencies (always needed):
#   - Only include if truly required
#   - Use ">=" for minimum version (allows fixes)
#   - Use "<X" for major version bound (prevents breaking changes)
#   - Example: "fastapi>=0.116.0,<1"  (supports 0.16+ but not breaking 1.0)
#
# Optional dependencies:
#   - Group by use case (dev, test, notebooks, deployment)
#   - Users install only what they need
#   - Install specific extra: pip install stochastic-transit-router[notebooks]
#   - Install all extras: pip install stochastic-transit-router[all]
#

# DEPENDENCY RANGES:
# ==================
#
# Flexible (recommended for libraries):
#   "package>=1.0.0"           = 1.0.0 or newer
#   "package>=1.0.0,<2"        = 1.x.x (safe for bugfixes)
#   "package~=1.4.2"           = 1.4.2 or 1.4.x (compatible)
#
# Strict (not recommended, breaks compatibility):
#   "package==1.4.2"           = Exact version (very restrictive!)
#   "package>1.0"              = Later than 1.0 (uncertain)
#

# PYTHON VERSION SUPPORT:
# =======================
#
# requires-python = ">=3.12"
#   = Python 3.12.0 or newer
#   = Minimum supported version
#
# Update when:
#   - Using new Python features (match python_version in .mypy.ini)
#   - Dropping end-of-life versions
#   - Testing with new Python releases
#
# Current (2026-04-05):
#   - Python 3.12: Current stable
#   - Python 3.13: Development version
#   - Python 3.11+: End-of-life planning
#

# TESTING CONFIGURATION:
# ======================
#
# Coverage threshold: 80%+
#   - New code: 100% coverage
#   - Existing code: maintain or improve
#   - Exceptions: generated code, complex integrations
#
# Test markers:
#   - @pytest.mark.unit: Fast tests, no I/O
#   - @pytest.mark.integration: Database/API tests
#   - @pytest.mark.e2e: Full system tests
#   - @pytest.mark.slow: Takes >1 second
#   - @pytest.mark.benchmark: Performance tests
#

# LICENSE:
# ========
#
# EUPL-1.2 (European Union Public Licence v1.2):
#   - Open source, copyleft (like GPL)
#   - Compatible with many licenses
#   - Strong patent clause
#   - Formal legal text for EU
#   - Not OSI-approved (but widely used in EU)
#
# Choosing license:
#   - EUPL-1.2: Copyleft, European context
#   - Apache 2.0: Permissive, patent clause
#   - MIT: Simple, permissive
#   - GPL-3.0: Copyleft, GNU
#

# PEP 621 COMPLIANCE:
# ===================
#
# This pyproject.toml follows PEP 621 standard:
#   - Uses [project] table for metadata
#   - No setup.py required (uses setuptools.build_meta)
#   - All configuration in single file
#   - Standardized format recognized by all tools
#
# See: https://www.python.org/dev/peps/pep-0621/
#

# ============================================================================
# RUNNING COMMON COMMANDS
# ============================================================================

# INSTALLATION:
# =============
#
# Install core with dev tools:
#   pip install -e ".[dev,test]"
#
# Install all extras:
#   pip install -e ".[all]"
#
# Install for notebooks:
#   pip install -e ".[notebooks]"
#

# BUILDING:
# =========
#
# Build wheel and source distribution:
#   pip install build
#   python -m build
#
# This creates:
#   dist/stochastic_transit_router-0.1.0-py3-none-any.whl
#   dist/stochastic_transit_router-0.1.0.tar.gz
#

# TESTING:
# ========
#
# Run all tests:
#   pytest
#
# Run with coverage:
#   pytest --cov=src --cov-report=html
#
# Run specific test markers:
#   pytest -m "not slow"
#   pytest -m "unit"
#   pytest -m "integration"
#

# PUBLISHING:
# ===========
#
# Register on PyPI and upload:
#   python -m build
#   twine upload dist/*
#
# Test PyPI first:
#   twine upload --repository testpypi dist/*
#

# ============================================================================
# TROUBLESHOOTING
# ============================================================================

# Issue: "version not found" on import
#   Solution: Update version in src/__init__.py
#   Command: grep __version__ src/stochastic_transit_router/__init__.py
#
# Issue: Coverage threshold not met
#   Solution: Lower threshold temporarily or add tests
#   Command: pytest --cov-fail-under=70
#
# Issue: Tests not discovered
#   Solution: Check test file naming (test_*.py or *_test.py)
#   Command: pytest --collect-only
#
# Issue: Dependencies not installing
#   Solution: Update pip and try again
#   Command: pip install --upgrade pip setuptools wheel
#

# ============================================================================
# FILES SYNCHRONIZED WITH THIS CONFIG
# ============================================================================

# Files that reference versions/config from pyproject.toml:
#
# - src/stochastic_transit_router/__init__.py
#   Contains: __version__ (keep in sync with [project] version)
#
# - CHANGELOG.md
#   Contains: Release notes (keep version history updated)
#
# - .github/workflows/release.yml (if using)
#   Contains: Version extraction from pyproject.toml
#
# - docs/conf.py (if building docs with Sphinx)
