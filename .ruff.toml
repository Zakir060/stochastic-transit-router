# ============================================================================
# RUNNING RUFF
# ============================================================================

# Check code for violations:
#   ruff check src/
#
# Fix violations automatically:
#   ruff check --fix src/
#
# Apply unsafe fixes (be careful):
#   ruff check --fix --unsafe src/
#
# Format code (auto-formatting):
#   ruff format src/
#
# Show what would be formatted (dry-run):
#   ruff format --diff src/
#
# Show statistics (which rules violated most):
#   ruff check --statistics src/
#
# Check single file:
#   ruff check src/module.py
#
# Show code for violation:
#   ruff check --show-settings src/
#
# Update to latest rules:
#   ruff rule E501  # Show details for rule E501
#

# ============================================================================
# INTEGRATION WITH OTHER TOOLS
# ============================================================================

# PRE-COMMIT INTEGRATION:
# =======================
# Ruff runs automatically before commits via .pre-commit-config.yaml
# Stops commit if violations found (unless --no-verify used)
#
# Command: pre-commit run ruff-check --all-files
# Command: pre-commit run ruff-format --all-files
#

# VS CODE INTEGRATION:
# ====================
# Install: Ruff extension for VS Code
# Settings in .vscode/settings.json:
#
# {
#   "[python]": {
#     "editor.defaultFormatter": "charliermarsh.ruff",
#     "editor.formatOnSave": true,
#     "editor.codeActionsOnSave": {
#       "source.fixAll.ruff": true
#     }
#   },
#   "ruff.importStrategy": "fromEnvironment",
#   "ruff.lint.args": ["--config=.ruff.toml"]
# }
#

# PYCHARM INTEGRATION:
# ====================
# Settings → Languages & Frameworks → Python → Linter
# Select Ruff as linter
# Point to .ruff.toml configuration file
# PyCharm will highlight violations in editor
#

# ============================================================================
# RULE CODE REFERENCE (QUICK LOOKUP)
# ============================================================================

# E/W - pycodestyle (PEP 8 violations)
#   E1: Indentation
#   E2: Whitespace
#   E3: Blank lines
#   E5: Line length
#   W: Warnings
#
# F - Pyflakes (undefined names, unused imports)
#   F4: Import errors
#   F8: Name errors
#   F8: Local variable errors
#
# I - isort (import sorting)
#   I1: Unsorted imports
#   I2: Missing imports
#
# B - flake8-bugbear (common bugs)
#   B0: General categories
#   B1: Logical errors
#   B9: Advanced topics
#
# UP - pyupgrade (modernization)
#   UP0: Syntax improvements
#   UP1: Type hint improvements
#   UP2: Deprecated syntax
#
# N - pep8-naming (naming conventions)
#   N8: Naming convention violations
#
# ANN - flake8-annotations (type hints required)
#   ANN1: Function argument annotations
#   ANN2: Return value annotations
#
# D - pydocstyle (docstrings)
#   D1: Missing docstrings
#   D2: Docstring formatting
#   D8: Docstring content
#
# S - bandit (security)
#   S1: General security
#   S3: SQL injection
#   S6: Cryptography
#   S7: Pickle security
#
# RUF - Ruff-specific
#   RUF: Ruff improvements
#

# ============================================================================
# NOTES AND BEST PRACTICES
# ============================================================================

# 1. AUTOPSY:
#    Run regularly: ruff check --fix && ruff format
#    Keeps code clean and consistent throughout development
#
# 2. PRE-COMMIT:
#    Hooks run before every commit
#    Prevents committing code that violates rules
#    Ensures main branch always follows standards
#
# 3. OVERRIDE WHEN NECESSARY:
#    # noqa - Suppress violations on specific line
#    # type: ignore - Suppress type checking
#    Use sparingly and document WHY override needed
#
# 4. IDE SUPPORT:
#    Use IDE with Ruff integration for real-time feedback
#    Errors show inline as you type
#    Much faster feedback than running command-line tool
#
# 5. GRADUAL ADOPTION:
#    If adding Ruff to existing project:
#    - Start with format only
#    - Gradually enable lint rules
#    - Fix violations in phases
#

# ============================================================================
# CONFIGURATION MAINTENANCE
# ============================================================================

# Keep up-to-date:
#   pip install --upgrade ruff          # Latest version
#   ruff rule                            # List all available rules
#   ruff rule E501                       # Show details for rule
#
# Import rules for new dependencies:
#   Add to [lint.isort] known-third-party when adding dependencies
#

